CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=8192

# Pouch over BLE GATT, encrypted (saead) with device identity + PoP auth
CONFIG_POUCH=y
CONFIG_POUCH_ENCRYPTION_SAEAD=y
CONFIG_POUCH_VALIDATE_SERVER_CERT=n
CONFIG_POUCH_TRANSPORT_BLE_GATT=y
CONFIG_POUCH_BLOCK_SIZE=512
CONFIG_POUCH_THREAD_STACK_SIZE=4096
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=n
CONFIG_MBEDTLS_USER_CONFIG_FILE="mbedtls_user_config.h"

# Provisioning: Wi-Fi + credential bootstrap + identity + auth
CONFIG_POUCH_PROV=y
CONFIG_POUCH_PROV_WIFI=y
CONFIG_POUCH_PROV_CRED=y
CONFIG_POUCH_PROV_IDENTITY=y
CONFIG_POUCH_PROV_AUTH=y

# Bluetooth peripheral (LE Secure Connections)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# Settings storage (BT bonds, device identity, Wi-Fi + cloud credentials)
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

# Wi-Fi station
CONFIG_WIFI=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONNECTION_MANAGER=y

# Golioth Firmware SDK (certificate auth)
CONFIG_GOLIOTH_FIRMWARE_SDK=y
CONFIG_GOLIOTH_AUTH_METHOD_CERT=y
CONFIG_NET_SOCKETS=y
CONFIG_DNS_RESOLVER=y
