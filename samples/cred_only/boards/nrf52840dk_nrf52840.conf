# nRF52840 DK overrides for the saead cred_only sample. The nRF runs Zephyr's
# software LL controller and does all P-256 ECDH on-device — both the LESC
# pairing DHKey and, for saead, the pouch session-key agreement. The software
# P-256 is stack-heavy, so several threads need more room than the sample's
# defaults; the crash otherwise is a stack overflow in the register-spill path.

# k_malloc() in the pouch/prov RPC allocator.
CONFIG_HEAP_MEM_POOL_SIZE=16384

# LESC key distribution / bond persistence runs on the system workqueue.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# The saead session-key ECDH runs on the Bluetooth host RX workqueue ("BT RX
# WQ", stack = BT_RX_STACK_SIZE); its 1200-byte default overflows during the
# software P-256 agreement (fault thread = bt_workq).
CONFIG_BT_RX_STACK_SIZE=6144

# Note: BT_CTLR_RX_PRIO_STACK_SIZE (the software controller's DHKey thread) is
# promptless upstream; validation uses an in-tree Zephyr patch raising its
# default to 4096. It cannot be set from this overlay.
