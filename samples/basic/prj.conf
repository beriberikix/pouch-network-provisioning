CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096

# Pouch over BLE GATT, plaintext for M2 transport bring-up (saead in M3)
CONFIG_POUCH=y
CONFIG_POUCH_ENCRYPTION_NONE=y
CONFIG_POUCH_TRANSPORT_BLE_GATT=y
CONFIG_POUCH_BLOCK_SIZE=512
CONFIG_POUCH_THREAD_STACK_SIZE=4096

CONFIG_POUCH_PROV=y
CONFIG_POUCH_PROV_WIFI=n
CONFIG_POUCH_PROV_CRED=n
CONFIG_POUCH_PROV_IDENTITY=n

# Bluetooth peripheral
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="pouch-prov"
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# LE Secure Connections pairing (Just Works). On esp32s3, disabling the p256m
# PSA driver left LESC's P-256 ECDH on an mbedTLS/PSA path that is not properly
# initialised, so pairing crashed the device (load-prohibited fault right after
# the public-key exchange). p256m is a self-contained constant-time secp256r1
# implementation with no platform-crypto-init dependency, so keep it enabled.
# (The upstream "p256m breaks secp384r1" note only affects cert/saead builds,
# which this transport bring-up sample does not use.)
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=y
# The host P-256 keygen/DHKey run on bt_long_wq, and the LESC confirm/DHKey-check
# crypto runs on the BT RX thread. The default stacks (1400 / 1200 bytes) are too
# small for the mbedTLS-PSA P-256 work, which overflowed during pairing (Xtensa
# stack-overflow fault in the register-spill restore). Size both generously.
CONFIG_BT_LONG_WQ_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=4096
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
# Zephyr's default bond table holds a single peer, so a device provisioned from
# one phone silently rejects pairing from any other (SMP has nowhere to store
# the new bond, and the client only sees ATT "insufficient authentication").
CONFIG_BT_MAX_PAIRED=5

# KNOWN ISSUE (not fixed here): on esp32s3 with Zephyr v4.3.0, a *bonded*
# LE reconnect is terminated by the controller with a MIC failure (HCI 0x3d)
# right after encryption is enabled, so only the first (pairing) connection
# works. This is upstream Zephyr #108785, fixed on main/v4.4 by #109304
# (coordinated hal_espressif controller-lib + BT-driver Kconfig changes that
# do not backport cleanly to v4.3.0). The real fix is moving the Zephyr pin to
# v4.4.1+ in step with pouch. See west.yml.

# Persist bonds across reboots so a reflash doesn't strand a central's
# cached key. settings_load() in the manager restores the identity + bonds.
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

# Debug (M2 bring-up)
CONFIG_POUCH_TRANSPORT_LOG_LEVEL_DBG=y
CONFIG_POUCH_PROV_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_BT_SMP_LOG_LEVEL_DBG=y
CONFIG_BT_CONN_LOG_LEVEL_DBG=y
