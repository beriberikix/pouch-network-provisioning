# Overlay: build the basic sample in encrypted (saead) mode with the M3
# device identity + PoP auth. Used for M3 compile/bring-up:
#   west build -b <board> samples/basic -- -DEXTRA_CONF_FILE=saead.conf
CONFIG_POUCH_ENCRYPTION_NONE=n
CONFIG_POUCH_ENCRYPTION_SAEAD=y
CONFIG_POUCH_VALIDATE_SERVER_CERT=n

CONFIG_POUCH_PROV_IDENTITY=y
CONFIG_POUCH_PROV_AUTH=y

CONFIG_SAMPLE_POP="abcd1234"

# saead's P-256 ECDH pairing needs the same p256m workaround as BT SC.
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=n
CONFIG_MBEDTLS_USER_CONFIG_FILE="mbedtls_user_config.h"
