# nRF52840 DK overrides for samples/basic. Validated end-to-end against a phone:
# scan -> connect -> LESC bond -> reconnect -> pouch .prov/ver + .prov/ctrl.
#
# Unlike esp32s3 (blob controller), nRF runs Zephyr's software LL controller and
# does the LESC P-256 work on-device, which needs more stack on several threads
# than the sample's defaults provide (the crash otherwise is a stack overflow in
# the register-spill path). It also uses a kernel heap for the RPC allocator.

# k_malloc() in src/rpc.c (esp32 pulls a heap pool in via its SoC defaults).
CONFIG_HEAP_MEM_POOL_SIZE=16384

# LESC key distribution / bond persistence runs on the system workqueue.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# KNOWN GAP: the software controller computes the P-256 DHKey on its RX-priority
# thread, whose upstream default (CONFIG_BT_CTLR_RX_PRIO_STACK_SIZE=448) overflows
# during pairing. That symbol is *promptless* with an unconditional upstream
# default, so it cannot be raised from a downstream .conf or `configdefault`.
# End-to-end validation used a local Zephyr patch bumping it to 4096. The clean
# fix is upstream (make it configurable / raise it) — tracked with the ESP32-S3
# reconnect work in the v4.4.1 Zephyr bump.
