# Overlay: enable Wi-Fi provisioning endpoints (compile/bring-up).
#   west build -b esp32s3_devkitc/esp32s3/procpu samples/basic \
#     -- -DEXTRA_CONF_FILE="saead.conf;wifi.conf"
CONFIG_POUCH_PROV_WIFI=y
CONFIG_WIFI=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
