CONFIG_ZTEST=y
CONFIG_ZCBOR=y
CONFIG_ZCBOR_CANONICAL=y

CONFIG_NETWORKING=y
CONFIG_WIFI=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y

CONFIG_POUCH_PROV_FAKE_WIFI=y

# Credentials backend: the PSA backend needs TF-M (absent on native_sim),
# so use the settings backend over NVS on the flash simulator.
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_ENTROPY_GENERATOR=y
