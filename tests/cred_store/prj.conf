CONFIG_ZTEST=y

CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

# mbedtls X.509 parse for finalize validation. The user config (which
# enables X509_CRT_PARSE_C etc.) is only honored with the builtin mbedtls.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="mbedtls_user_config.h"

CONFIG_HEAP_MEM_POOL_SIZE=16384
