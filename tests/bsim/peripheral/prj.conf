# BabbleSim DUT image: the provisioning service in plaintext mode
# (samples/basic minus persistence — no flash on the simulated nRF52
# is needed; manager.c guards all settings usage behind IS_ENABLED).
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_MAIN_STACK_SIZE=4096
# src/rpc.c k_malloc()s response buffers (<= POUCH_PROV_MSG_MAX each).
CONFIG_HEAP_MEM_POOL_SIZE=8192

CONFIG_POUCH=y
CONFIG_POUCH_ENCRYPTION_NONE=y
CONFIG_POUCH_TRANSPORT_BLE_GATT=y
CONFIG_POUCH_BLOCK_SIZE=512
CONFIG_POUCH_THREAD_STACK_SIZE=4096

CONFIG_POUCH_PROV=y
CONFIG_POUCH_PROV_WIFI=n
CONFIG_POUCH_PROV_CRED=n
CONFIG_POUCH_PROV_IDENTITY=n
CONFIG_POUCH_PROV_AUTH=n

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="pouch-prov-bsim"
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# The p256m driver is pulled in by BT_SMP but breaks the P-256 ECDH used
# for LE Secure Connections pairing (matches samples/basic).
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=n

CONFIG_POUCH_TRANSPORT_LOG_LEVEL_DBG=y
CONFIG_POUCH_PROV_LOG_LEVEL_DBG=y
