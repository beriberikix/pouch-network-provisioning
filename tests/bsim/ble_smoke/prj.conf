#
# BabbleSim central tester. MTU/ACL sizes match the peripheral so the
# stretch (.prov round-trip) can reuse this image unchanged.
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_SECURITY_ERR_TO_STR=y

# The p256m driver is pulled in by BT_SMP but breaks the P-256 ECDH used
# for LE Secure Connections pairing (matches samples/basic).
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=n
