# West manifest for developing pouch-network-provisioning standalone.
# Downstream users add this repo as a project in their own manifest instead.
manifest:
  # Zephyr's manifest disables the babblesim group by default; enable it so
  # the bsim BLE tests (tests/bsim) can build the simulator from tools/bsim.
  group-filter: [+babblesim]

  self:
    path: pouch-network-provisioning

  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos
    - name: golioth
      url-base: https://github.com/golioth

  projects:
    # Same Zephyr revision pouch pins (pouch west-zephyr.yml).
    #
    # NOTE (BLE bonded-reconnect MIC failure on ESP32-S3): v4.3.0's bundled
    # ESP32-S3 BT controller terminates every bonded LE reconnect with a MIC
    # failure (HCI 0x3d). This is upstream Zephyr issue #108785, fixed on main
    # / v4.4 by #109304 (coordinated hal_espressif controller-lib + BT-driver
    # Kconfig changes). The fix does not cleanly backport onto v4.3.0. Moving
    # this pin to v4.4.1+ (in step with pouch) is the real fix.
    - name: zephyr
      remote: zephyrproject
      revision: v4.3.0
      import:
        name-allowlist:
          - cmsis_6
          - hal_espressif
          - hal_nordic
          - hal_nxp
          - littlefs
          - mbedtls
          - mcuboot
          - net-tools
          - nrf_hw_models # nRF radio HW models for the nrf52_bsim board
          - segger
          - tinycrypt
          - zcbor
        # BabbleSim simulator + components (babblesim group), for tests/bsim.
        path-allowlist:
          - tools/bsim
          - tools/bsim/*
          - tools/bsim/*/*
    - name: pouch
      remote: golioth
      revision: 18ae45883ce23eb1e0de0dc87ee81dbb9c983043
      path: modules/lib/pouch
    # Only needed by samples/golioth_bootstrap.
    - name: golioth-firmware-sdk
      remote: golioth
      revision: 1996a1d3b73fe5df39b5780f53f6ed091c1a82db
      path: modules/lib/golioth-firmware-sdk
      submodules: true
      groups:
        - samples
