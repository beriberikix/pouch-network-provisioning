name: Release

on:
  push:
    tags: ["v*"]
  # Dry run: builds the APK but skips publishing the GitHub Release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-app:
    name: Android app (release APK + GitHub Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Test + assemble release APK
        working-directory: android
        run: ./gradlew :pouchprov-core:test :app:assembleRelease
      - name: Stage APK under release name
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
            "pouchprov-app-${{ github.ref_name }}.apk"
      - name: Upload APK (dry-run artifact)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: pouchprov-app-release
          path: pouchprov-app-*.apk
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: pouchprov-app-${{ github.ref_name }}.apk
          body: |
            The attached Android app APK installs with `adb install -r <apk>`
            (or via the phone's file manager). It is signed with the repo's
            shared debug keystore, so it installs over locally built and
            CI-built copies without uninstalling.
