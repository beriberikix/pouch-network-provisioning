name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ztest:
    name: Device tests (native_sim)
    runs-on: ubuntu-latest
    container: ghcr.io/zephyrproject-rtos/ci:v0.28.4
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: pouch-network-provisioning

      - name: West init + update (skip sample-only deps)
        run: |
          west init -l pouch-network-provisioning
          # Skip the Golioth SDK (samples group) — not needed for ztests and
          # pulls large submodules. zephyr's allowlisted modules still come in.
          west config manifest.group-filter -- -samples
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install twister Python deps
        run: pip3 install -r zephyr/scripts/requirements.txt

      - name: Twister — ztest suites
        run: |
          west twister -T pouch-network-provisioning/tests \
            -p native_sim --inline-logs -v --outdir twister-ztest

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-ztest
          path: twister-ztest/twister.xml
          if-no-files-found: ignore

  bsim:
    name: BLE transport test (BabbleSim)
    runs-on: ubuntu-latest
    container: ghcr.io/zephyrproject-rtos/ci:v0.28.4
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: pouch-network-provisioning

      - name: West init + update (skip sample-only deps)
        run: |
          west init -l pouch-network-provisioning
          west config manifest.group-filter -- -samples
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Build BabbleSim
        run: |
          make -C tools/bsim everything -j $(nproc)
          echo "BSIM_OUT_PATH=$(west topdir)/tools/bsim/" >> $GITHUB_ENV
          echo "BSIM_COMPONENTS_PATH=$(west topdir)/tools/bsim/components/" >> $GITHUB_ENV

      - name: Install twister + pouch Python deps
        run: |
          pip3 install -r zephyr/scripts/requirements.txt
          pip3 install -r modules/lib/pouch/requirements.txt  # zcbor (pouch build)

      - name: Twister — bsim BLE smoke test
        run: |
          west twister -T pouch-network-provisioning/tests/bsim \
            -p nrf52_bsim/native -v --inline-logs --outdir twister-bsim

      - name: Check the bsim suite actually ran
        # Guard against a silent platform skip: twister filters nrf52_bsim
        # out entirely (and exits 0) if BSIM_OUT_PATH isn't set.
        run: grep -q "pouch_prov.bsim.ble_smoke" twister-bsim/twister.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-bsim
          path: |
            twister-bsim/twister.xml
            twister-bsim/**/handler.log
            twister-bsim/**/twister_harness.log
            twister-bsim/**/build.log
          if-no-files-found: ignore

  build:
    name: Sample builds
    runs-on: ubuntu-latest
    container: ghcr.io/zephyrproject-rtos/ci:v0.28.4
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: pouch-network-provisioning

      - name: West init + update (with sample deps)
        run: |
          west init -l pouch-network-provisioning
          west update --narrow -o=--depth=1
          west zephyr-export
          west blobs fetch hal_espressif

      - name: Install twister + pouch Python deps
        run: |
          pip3 install -r zephyr/scripts/requirements.txt
          pip3 install -r modules/lib/pouch/requirements.txt  # zcbor (pouch build)

      - name: Build samples (esp32s3)
        run: |
          west twister -T pouch-network-provisioning/samples \
            -p esp32s3_devkitc/esp32s3/procpu --build-only \
            --inline-logs -v --outdir twister-build

  cli:
    name: CLI (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install + check
        run: |
          uv venv
          uv pip install -e "cli[dev]"
          .venv/bin/ruff check cli/src cli/tests
          .venv/bin/pytest cli

  android:
    name: Android (core tests + assemble)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Core conformance tests (golden vectors, pure JVM)
        working-directory: android
        # Reads the shared tests/vectors/*.json — the same fixtures the CLI and
        # the device codec are pinned to — and checks them byte-for-byte.
        run: ./gradlew :pouchprov-core:test
      - name: Lint + assemble the library and app
        working-directory: android
        run: ./gradlew :pouchprov-ble:lintDebug :pouchprov-ble:assembleDebug :app:assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pouchprov-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Upload test + lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            android/pouchprov-core/build/reports/tests/**
            android/pouchprov-ble/build/reports/lint-results-debug.*
          if-no-files-found: ignore

  swift-core:
    name: Swift core tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Core conformance tests (golden vectors, platform-independent)
        # Reads the shared tests/vectors/*.json — the same fixtures the CLI,
        # the Kotlin SDK and the device codec are pinned to.
        working-directory: ios/PouchProv
        run: swift test

  ios:
    name: iOS (core tests + app build)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version
      - name: Core conformance tests (golden vectors, pure Swift)
        working-directory: ios/PouchProv
        run: |
          set -o pipefail
          swift test 2>&1 | tee swift-test.log
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate the app project
        working-directory: ios/PouchProvApp
        run: xcodegen generate
      - name: Build the app (Simulator, no signing)
        working-directory: ios/PouchProvApp
        run: |
          set -o pipefail
          xcodebuild build \
            -project PouchProvApp.xcodeproj -scheme PouchProvApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee xcodebuild.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-logs
          path: |
            ios/PouchProv/swift-test.log
            ios/PouchProvApp/xcodebuild.log
          if-no-files-found: ignore

  codegen:
    name: Generated code in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Regenerate zcbor codec + vectors and diff
        run: |
          uv venv
          uv pip install "zcbor==0.9.1" "cbor2>=5.6,<5.7" cryptography click
          rm -rf src/codec
          .venv/bin/zcbor code -c cddl/prov.cddl -d -e --default-max-qty 8 \
            -t ver-req ver-rsp auth-req auth-rsp config-req config-rsp \
               scan-req scan-rsp cred-req cred-rsp ctrl-req ctrl-rsp \
            --output-c src/codec/prov.c --output-h src/codec/include/prov.h
          .venv/bin/python scripts/gen_vectors.py
          .venv/bin/python scripts/vectors_to_c.py
          git diff --exit-code -- src/codec tests/vectors tests/codec/src/vectors.inc \
            || (echo "::error::Generated code is out of date; run zcbor + scripts/gen_vectors.py + scripts/vectors_to_c.py" && exit 1)
